<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Clientes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .alert { padding: 15px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px; margin-bottom: 20px; }

        /* Barra de Busca */
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-search { background-color: #34495e; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background-color: #fff; }
        th { background-color: #34495e; color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #f1f4f6; }

        .btn-new { background-color: #27ae60; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .btn-edit { background-color: #3498db; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .btn-delete { background-color: #e74c3c; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; }
        .col-acoes { text-align: center; width: 160px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lista de Clientes</h1>

    <!-- Mensagem de Sucesso -->
    <div th:if="${mensagem}" class="alert" th:text="${mensagem}"></div>

    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <a th:href="@{/clientes/cadastrar}" class="btn-new">+ Novo Cliente</a>

        <!-- Formulário de Busca -->
        <form th:action="@{/clientes/listar}" method="get" class="search-container" style="width: 50%;">
            <input type="text" name="busca" th:value="${buscaAtiva}" class="search-input" placeholder="Buscar por nome...">
            <button type="submit" class="btn-search">Buscar</button>
            <a th:if="${buscaAtiva}" th:href="@{/clientes/listar}" style="color: #e74c3c; font-size: 12px; text-decoration: none; margin-left: 5px;">Limpar</a>
        </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Idade</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>CPF</th>
            <th>RG</th>
            <th class="col-acoes">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${cliente}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nome}"></td>
            <td th:text="${c.idade}"></td>
            <td th:text="${c.numeroTelefone}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.CPF}"></td>
            <td th:text="${c.RG}"></td>
            <td class="col-acoes">
                <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn-edit">Editar</a>
                <a th:href="@{/clientes/delete/{id}(id=${c.id})}" onclick="return confirm('Deseja excluir este cliente?')" class="btn-delete">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
