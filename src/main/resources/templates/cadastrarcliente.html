<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <style>
        /* Estilos Gerais (Mesma base da lista) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px; text-align: center; }

        /* Estilo do Formulário */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }

        /* Botões */
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { flex: 2; background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; text-decoration: none; }
        .btn-save:hover { background-color: #219150; }

        .btn-back { flex: 1; background-color: #95a5a6; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; text-decoration: none; }
        .btn-back:hover { background-color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>Novo Cliente</h1>

    <!-- th:object vincula o formulário ao seu ClientDTO -->
    <form th:action="@{/clientes/salvar}" th:object="${clientDTO}" method="POST">

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" th:field="*{nome}" placeholder="Ex: João Silva" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Idade</label>
                <input type="number" th:field="*{idade}" placeholder="0" required>
            </div>
            <div class="form-group" style="flex: 2;">
                <label>Telefone</label>
                <input type="text" th:field="*{numeroTelefone}" placeholder="(00) 00000-0000" required>
            </div>
        </div>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" th:field="*{email}" placeholder="exemplo@email.com" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>CPF</label>
                <input type="text" th:field="*{CPF}" placeholder="000.000.000-00" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>RG</label>
                <input type="text" th:field="*{RG}" placeholder="00.000.000-0" required>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-save">Salvar Cliente</button>
            <a th:href="@{/clientes/listar}" class="btn-back">Cancelar</a>
        </div>
    </form>
</div>

</body>
</html>
